<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        h1 {
            font-family: 'Boldonse', system-ui, sans-serif;
        }
        #qr-output {
            padding: 24px;
            background: white;
            border-radius: 12px;
        }
        /* Dark mode: recess the panel to gray-800 (slightly lighter than the
           card) so the QR's own white square reads as the light area on top. */
        @media (prefers-color-scheme: dark) {
            #qr-output {
                background: #1f2937;
            }
        }
        /* Cap the on-screen QR so the panel keeps its empty-state height
           (min-h-64 = 256px) instead of growing when a code is generated.
           Vector output (SVG/PNG downloads) is unaffected by this display size. */
        #qr-output svg {
            width: 100%;
            max-width: 208px;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-[480px] px-4 py-8">
        <div class="bg-white dark:bg-gray-900 rounded-lg shadow-sm dark:shadow-none p-8">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">QR Generator</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-8">Generate QR codes from URLs — download as SVG or PNG</p>
            
            <div class="space-y-4">
                <div>
                    <label for="url" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        URL
                    </label>
                    <input
                        type="url"
                        id="url"
                        placeholder="https://example.com"
                        value=""
                        autofocus
                        class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-800 dark:text-white dark:placeholder-gray-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-white focus:border-transparent"
                    />
                </div>
                
                <button
                    id="generate-btn"
                    class="w-full bg-gray-900 text-white dark:bg-white dark:text-gray-900 font-medium py-2 px-4 rounded-lg hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors"
                >
                    Generate QR Code
                </button>
            
            
            <!-- QR Code Display -->
            <div id="qr-output" class="mt-8 flex justify-center items-center min-h-64 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg">
                <p class="text-gray-400 dark:text-gray-500 text-center">QR code will appear here</p>
            </div>
                <div class="grid grid-cols-2 gap-3">
                    <button
                        id="download-btn"
                        disabled
                        class="bg-gray-200 text-gray-600 dark:bg-gray-800 dark:text-gray-300 font-medium py-2 px-4 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:enabled:bg-gray-300 dark:hover:enabled:bg-gray-700 transition-colors"
                    >
                        Download SVG
                    </button>
                    <button
                        id="download-png-btn"
                        disabled
                        class="bg-gray-200 text-gray-600 dark:bg-gray-800 dark:text-gray-300 font-medium py-2 px-4 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:enabled:bg-gray-300 dark:hover:enabled:bg-gray-700 transition-colors"
                    >
                        Download PNG
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
