<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        h1 {
            font-family: 'Boldonse', system-ui, sans-serif;
        }
        #qr-output {
            padding: 24px;
            background: white;
            border-radius: 12px;
        }
        svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-[480px] mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-sm p-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">QR Generator</h1>
            <p class="text-gray-500 text-sm mb-8">Generate SVG QR codes from URLs</p>
            
            <div class="space-y-4">
                <div>
                    <label for="url" class="block text-sm font-medium text-gray-700 mb-2">
                        URL
                    </label>
                    <input
                        type="url"
                        id="url"
                        placeholder="https://example.com"
                        value=""
                        autofocus
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
                    />
                </div>
                
                <button
                    id="generate-btn"
                    class="w-full bg-gray-900 text-white font-medium py-2 px-4 rounded-lg hover:bg-gray-800 transition-colors"
                >
                    Generate QR Code
                </button>
            
            
            <!-- QR Code Display -->
            <div id="qr-output" class="mt-8 flex justify-center items-center min-h-64 border-2 border-dashed border-gray-300 rounded-lg">
                <p class="text-gray-400 text-center">QR code will appear here</p>
            </div>
                <button
                    id="download-btn"
                    disabled
                    class="w-full bg-gray-200 text-gray-600 font-medium py-2 px-4 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed hover:enabled:bg-gray-300 transition-colors"
                >
                    Download as SVG
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
